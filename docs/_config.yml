title: sc3 - SuperCollider Library for Python
author: Lucas Samaruga
copyright: "2026, Lucas Samaruga"

execute:
  execute_notebooks: off

sphinx:
  extra_extensions:
    - sphinx.ext.autodoc
    - sphinx.ext.napoleon
    - sphinx.ext.autosummary
    - sphinx.ext.viewcode
  config:
    autodoc_member_order: 'bysource'
    myst_enable_extensions:
      - "colon_fence"
